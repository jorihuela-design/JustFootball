<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda Futbol Pro</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b3d0b;
            color: white;
        }

        header {
            background-color: black;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            color: #00ff88;
        }

        nav {
            background-color: #111;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #00ff88;
        }

        .banner {
            background: url('https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a') no-repeat center/cover;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .banner h2 {
            background-color: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 10px;
        }

        .productos {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .producto {
            background-color: #111;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s;
        }

        .producto:hover {
            transform: scale(1.05);
        }

        .producto img {
            width: 100%;
            border-radius: 10px;
        }

        .producto h3 {
            margin: 10px 0;
        }

        .producto p {
            color: #ccc;
        }

        .producto button {
            background-color: #00ff88;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }

        .producto button:hover {
            background-color: #00cc6a;
        }

        footer {
            background-color: black;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>⚽ Futbol Pro Shop</h1>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Balones</a>
    <a href="#">Tachones</a>
    <a href="#">Guantes</a>
    <a href="#">Contacto</a>
</nav>

<section class="banner">
    <h2>Equípate como un profesional 🔥</h2>
</section>

<section class="productos">

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1603297631954-88b28d8e3f8d" alt="Balón">
        <h3>Balón Profesional</h3>
        <p>$599 MXN</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1582582429416-8b50f1cde36f" alt="Tachones">
        <h3>Tachones Elite</h3>
        <p>$1,299 MXN</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="Guantes">
        <h3>Guantes de Portero</h3>
        <p>$799 MXN</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e" alt="Playera">
        <h3>Playera de Fútbol</h3>
        <p>$499 MXN</p>
        <button>Comprar</button>
    </div>

</section>

<footer>
    <p>© 2026 Futbol Pro Shop | Todos los derechos reservados</p>
</footer>

</body>
</html>
